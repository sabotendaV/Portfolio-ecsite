<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | LxL</title>
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body">

  <div class="auth-wrap">

    <!-- ロゴ -->
    <a th:href="@{/index}" class="auth-logo" >
		<img th:src="@{/images/Logo/LxL.offical1.png}" class="logo-image">
	</a>
    <p class="auth-subtitle">Sign in to your account</p>

    <!-- エラーメッセージ（Thymeleaf指示書参照） -->
    <!-- <div class="alert alert-error">
      メールアドレスまたはパスワードが正しくありません。
    </div> -->

    <!-- ログインフォーム（action → Thymeleaf指示書参照） -->
    <form th:action="@{/login}" method="post" class="auth-form">

      <!-- CSRF（Thymeleaf指示書参照） -->
      <!-- <input type="hidden" name="_csrf" th:value="${_csrf.token}"> -->

      <div class="form-group">
        <label class="form-label">メールアドレス</label>
        <input type="email" name="email" class="form-control" placeholder="mail@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label">パスワード</label>
        <div class="password-wrap">
          <input type="password" name="password" id="loginPw" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" data-target="loginPw" aria-label="パスワードを表示">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="auth-options">
        <label class="remember-label">
          <input type="checkbox" name="remember" class="remember-check"> ログイン状態を保持
        </label>
        <a href="#" class="forgot-link">パスワードをお忘れの方</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block auth-submit-btn">
        ログイン
      </button>

    </form>

    <div class="auth-divider"><span>or</span></div>

    <p class="auth-switch">
      アカウントをお持ちでない方は
      <a th:href="@{/register}">新規会員登録</a>
    </p>

    <a href="/index.html" class="auth-guest-link">ゲストとして続ける →</a>

  </div>

  <script>
    // パスワード表示切替
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });
  </script>

</body>
</html>
