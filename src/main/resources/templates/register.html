<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規会員登録 | LxL</title>
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body">

  <div class="auth-wrap auth-wrap-wide">

    <a th:href="@{/index}" class="auth-logo">
		 <img th:src="@{/images/Logo/LxL.offical1.png}" class="logo-image">
	</a>
    <p class="auth-subtitle">Create your account</p>

    <!-- バリデーションエラー（Thymeleaf指示書参照） -->
    <!-- <div class="alert alert-error">
      入力内容に誤りがあります。確認してください。
    </div> -->

    <!-- 登録フォーム（action → Thymeleaf指示書参照） -->
    <form th:action="@{/register}" method="post" class="auth-form">

      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">姓 <span class="form-required">*</span></label>
          <input type="text" name="lastName" class="form-control" placeholder="山田" required>
        </div>
        <div class="form-group">
          <label class="form-label">名 <span class="form-required">*</span></label>
          <input type="text" name="firstName" class="form-control" placeholder="太郎" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">メールアドレス <span class="form-required">*</span></label>
        <input type="email" name="email" class="form-control" placeholder="mail@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label">パスワード <span class="form-required">*</span></label>
        <div class="password-wrap">
          <input type="password" name="password" id="regPw" class="form-control" placeholder="8文字以上" autocomplete="new-password" required minlength="8">
          <button type="button" class="pw-toggle" data-target="regPw" aria-label="パスワードを表示">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p class="form-hint">英数字を含む8文字以上</p>
      </div>

      <div class="form-group">
        <label class="form-label">パスワード（確認） <span class="form-required">*</span></label>
        <div class="password-wrap">
          <input type="password" name="passwordConfirm" id="regPwConfirm" class="form-control" placeholder="もう一度入力" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" data-target="regPwConfirm" aria-label="パスワードを表示">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="terms-label">
          <input type="checkbox" name="agreeTerms" required>
          <a href="#" class="terms-link">利用規約</a>・<a href="#" class="terms-link">プライバシーポリシー</a>に同意します
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-block auth-submit-btn">
        会員登録する
      </button>

    </form>

    <div class="auth-divider"><span>or</span></div>

    <p class="auth-switch">
      すでにアカウントをお持ちの方は
      <a href="/login.html">ログイン</a>
    </p>

  </div>

  <script>
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });
  </script>

</body>
</html>
